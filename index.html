<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stallplan</title>
<style>
  :root{
    --bg:#23302A; --fg:#F1EBDA; --fg-dim:rgba(241,235,218,0.55);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:48px;}

  /* ---- Startseite ---- */
  .home-view{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;}
  .home-title{font-weight:800;letter-spacing:.05em;font-size:30px;text-transform:uppercase;margin-bottom:10px;}
  .home-btn{width:100%;max-width:300px;padding:22px;border-radius:14px;border:1px solid rgba(241,235,218,0.25);background:rgba(241,235,218,0.07);color:var(--fg);font-size:18px;font-weight:700;cursor:pointer;letter-spacing:.02em;}
  .home-btn:active{background:rgba(241,235,218,0.16);}
  .back-row{padding:14px 16px 0;}
  .backlink{background:transparent;border:none;color:var(--fg-dim);font-size:14px;cursor:pointer;padding:4px 0;}
  .primary-btn{width:100%;padding:14px 0;border-radius:12px;border:1px solid rgba(241,235,218,.3);background:rgba(241,235,218,.12);color:var(--fg);font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;}
  .primary-btn:active{background:rgba(241,235,218,.2);}

  /* ---- Stalldienst ---- */
  .board-section{padding:18px 16px 0;}
  .board-title{font-weight:800;letter-spacing:.06em;font-size:14px;text-transform:uppercase;color:var(--fg-dim);margin-bottom:8px;}
  textarea#boardText{width:100%;box-sizing:border-box;background:rgba(241,235,218,0.07);border:1px solid rgba(241,235,218,0.2);border-radius:10px;color:var(--fg);font-size:14px;padding:10px 12px;font-family:inherit;resize:vertical;min-height:64px;line-height:1.4;}
  textarea#boardText::placeholder{color:rgba(241,235,218,0.35);}
  .header{padding:16px 16px 14px;border-bottom:1px solid rgba(241,235,218,0.12);}
  .title{font-weight:800;letter-spacing:.04em;font-size:26px;text-transform:uppercase;}
  .subtitle{font-size:13px;color:var(--fg-dim);margin-top:2px;}
  .status{font-size:12px;display:flex;align-items:center;gap:6px;margin-top:6px;}
  .dot{width:8px;height:8px;border-radius:50%;background:#3E7C5A;}
  .dot.offline{background:#C1502E;}
  .navbtn{background:rgba(241,235,218,0.08);border:none;border-radius:8px;padding:8px 14px;cursor:pointer;color:var(--fg);font-size:18px;}
  .monthnav{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;}
  .monthlabel{font-size:17px;font-weight:700;}
  .people{padding:0 16px 6px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .people-hint{padding:0 16px 16px;font-size:12px;color:var(--fg-dim);}
  .chip{display:inline-flex;align-items:center;gap:6px;background:rgba(241,235,218,0.07);border-radius:999px;padding:6px 10px 6px 8px;font-size:13px;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;}
  .dotcolor{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}
  .addchip{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px dashed rgba(241,235,218,0.35);border-radius:999px;padding:6px 12px 6px 8px;font-size:13px;color:var(--fg);cursor:pointer;}
  .day-row{display:grid;grid-template-columns:52px 1fr 1fr;gap:8px;padding:8px 4px;border-bottom:1px solid rgba(241,235,218,0.08);margin:0 12px;}
  .daynum{display:flex;flex-direction:column;justify-content:center;}
  .weekday{font-size:11px;color:var(--fg-dim);text-transform:uppercase;}
  .num{font-size:18px;font-weight:800;}
  .num.today,.weekday.today{color:#C9A227;}
  .slot{border:1.5px dashed rgba(241,235,218,0.3);border-radius:8px;background:transparent;color:rgba(241,235,218,0.45);font-size:13px;padding:8px 10px;display:flex;flex-direction:column;gap:2px;cursor:pointer;min-height:48px;justify-content:center;text-align:left;width:100%;}
  .slot.filled{border:none;border-left:5px solid var(--c);background:color-mix(in srgb, var(--c) 18%, transparent);color:var(--fg);}
  .slotlabel{font-size:10px;text-transform:uppercase;opacity:.7;}
  .slotname{font-weight:700;font-size:14px;}

  /* ---- Hallenplan ---- */
  .hall-header{padding:16px 16px 4px;}
  .hall-title{font-weight:800;letter-spacing:.04em;font-size:22px;text-transform:uppercase;}
  .hall-weeknav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 10px;gap:10px;}
  .hall-weeklabel{font-size:13px;font-weight:700;text-align:center;flex:1;}
  .hall-legend{display:flex;gap:14px;padding:0 16px 14px;font-size:11px;color:var(--fg-dim);}
  .hall-legend span{display:inline-flex;align-items:center;gap:5px;}
  .hall-legend .sw{width:9px;height:9px;border-radius:3px;display:inline-block;}
  .hall-row{display:flex;align-items:stretch;border-bottom:1px solid rgba(241,235,218,0.1);padding:10px 12px;gap:10px;}
  .hall-row-label{width:50px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;}
  .hall-row-label .wd{font-size:11px;color:var(--fg-dim);text-transform:uppercase;}
  .hall-row-label .dt{font-weight:800;font-size:14px;}
  .hall-row-label.today .wd, .hall-row-label.today .dt{color:#C9A227;}
  .hall-chips{flex:1;display:flex;gap:8px;overflow-x:auto;padding:2px 0;align-items:center;}
  .hall-chip{flex-shrink:0;border-radius:10px;background:color-mix(in srgb, var(--c) 30%, var(--bg));border-left:4px solid var(--c);padding:7px 10px;min-width:84px;cursor:pointer;}
  .hall-chip .ti{font-weight:700;font-size:13px;white-space:nowrap;}
  .hall-chip .tm{font-size:11px;opacity:.85;margin-top:1px;}
  .hall-chip-empty{color:rgba(241,235,218,0.3);font-size:13px;align-self:center;}

  /* ---- gemeinsame Sheets ---- */
  .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:50;}
  .sheet-overlay.open{display:flex;}
  .sheet{width:100%;max-height:85vh;overflow-y:auto;background:#F1EBDA;color:#23302A;border-radius:18px 18px 0 0;padding:18px 18px 28px;}
  .sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .sheet-title{font-weight:800;font-size:16px;}
  .closebtn{background:transparent;border:none;cursor:pointer;color:#23302A;font-size:20px;}
  .person-btn{display:flex;align-items:center;gap:10px;border:none;border-radius:10px;padding:12px 14px;background:color-mix(in srgb, var(--c) 13%, white);border-left:5px solid var(--c);font-size:15px;font-weight:600;color:#23302A;text-align:left;cursor:pointer;width:100%;margin-bottom:8px;}
  .backbtn{display:block;border:none;background:transparent;color:rgba(35,48,42,.6);font-size:13px;padding:4px 2px 12px;cursor:pointer;}
  .clearbtn{margin-top:6px;width:100%;background:transparent;border:1px solid rgba(35,48,42,.25);border-radius:10px;padding:10px 0;font-size:14px;color:rgba(35,48,42,.7);cursor:pointer;}
  input[type=text]{width:100%;box-sizing:border-box;padding:12px 14px;border-radius:10px;border:1px solid rgba(35,48,42,.2);font-size:15px;margin-bottom:14px;color:#23302A;}
  .colorpick{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
  .colorbtn{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;}
  .colorbtn.selected{border-color:#23302A;}
  .addbtn{width:100%;padding:12px 0;border-radius:10px;border:none;background:#23302A;color:#F1EBDA;font-size:15px;font-weight:700;cursor:pointer;}
  .addbtn:disabled{background:rgba(35,48,42,.3);cursor:default;}
  .empty-note{color:rgba(35,48,42,.6);font-size:14px;padding:8px 4px;}
  .fieldlabel{font-size:13px;color:rgba(35,48,42,.7);display:block;margin-bottom:6px;}
  .recur-row{display:flex;align-items:center;gap:8px;font-size:14px;color:rgba(35,48,42,.85);margin:16px 0 20px;}

  /* ---- Wochentag-Auswahl ---- */
  .weekday-pick{display:flex;gap:6px;margin-bottom:6px;}
  .wd-btn{flex:1;padding:9px 0;border-radius:8px;border:1px solid rgba(35,48,42,.2);background:white;color:#23302A;font-size:13px;font-weight:600;cursor:pointer;}
  .wd-btn.selected{background:#23302A;color:#F1EBDA;border-color:#23302A;}

  /* ---- Scrollrädchen ---- */
  .wheel-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px;background:rgba(35,48,42,.05);border-radius:10px;padding:6px 0;position:relative;}
  .wheel-row::before{content:"";position:absolute;left:8px;right:8px;top:50%;height:36px;transform:translateY(-50%);border-top:1px solid rgba(35,48,42,.25);border-bottom:1px solid rgba(35,48,42,.25);pointer-events:none;}
  .wheel-scroll{height:108px;width:64px;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;}
  .wheel-scroll::-webkit-scrollbar{display:none;}
  .wheel-item{height:36px;display:flex;align-items:center;justify-content:center;font-size:17px;color:rgba(35,48,42,.4);scroll-snap-align:center;}
  .wheel-item.selected{color:#23302A;font-weight:800;font-size:19px;}
  .wheel-sep{font-size:18px;font-weight:700;color:#23302A;}
</style>
</head>
<body>

<!-- ============ STARTSEITE ============ -->
<div class="home-view" id="homeView">
  <div class="home-title">Stallplan</div>
  <button class="home-btn" id="goStall">🐴 Stalldienst</button>
  <button class="home-btn" id="goHall">🏟️ Hallenplan</button>
</div>

<!-- ============ STALLDIENST ============ -->
<div id="stallView" style="display:none;">
  <div class="back-row"><button class="backlink" id="stallBack">‹ Zur Startseite</button></div>

  <div class="board-section">
    <div class="board-title">Schwarzes Brett</div>
    <textarea id="boardText" rows="3" placeholder="Aktuelle Hinweise für alle..."></textarea>
  </div>

  <div class="header">
    <div class="title">Stalldienst</div>
    <div class="subtitle">Antippen, Name wählen, fertig.</div>
    <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">Verbinde…</span></div>
  </div>

  <div class="monthnav">
    <button class="navbtn" id="prevMonth" aria-label="Vorheriger Monat">‹</button>
    <div class="monthlabel" id="monthLabel"></div>
    <button class="navbtn" id="nextMonth" aria-label="Nächster Monat">›</button>
  </div>

  <div class="people" id="peopleBoard"></div>
  <div class="people-hint" id="peopleHint" style="display:none;">Person gedrückt halten (ca. 1 Sek.), um sie zu entfernen.</div>

  <div id="daysList"></div>
</div>

<!-- ============ HALLENPLAN ============ -->
<div id="hallView" style="display:none;">
  <div class="back-row"><button class="backlink" id="hallBack">‹ Zur Startseite</button></div>

  <div class="hall-header">
    <div class="hall-title">Hallenplan</div>
    <button class="primary-btn" id="hallAddBtn">+ Termin hinzufügen</button>
  </div>

  <div class="hall-weeknav">
    <button class="navbtn" id="hallPrevWeek" aria-label="Vorherige Woche">‹</button>
    <div class="hall-weeklabel" id="hallWeekLabel"></div>
    <button class="navbtn" id="hallNextWeek" aria-label="Nächste Woche">›</button>
  </div>

  <div class="hall-legend">
    <span><span class="sw" style="background:#C1502E;"></span>einmalig</span>
    <span><span class="sw" style="background:#3E6B8A;"></span>Regeltermin 🔁</span>
  </div>

  <div id="hallRows"></div>
</div>

<!-- ============ Sheets: Stalldienst ============ -->
<div class="sheet-overlay" id="assignOverlay">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-header">
      <div class="sheet-title" id="assignTitle"></div>
      <button class="closebtn" id="assignClose">✕</button>
    </div>
    <div id="assignList"></div>
    <button class="clearbtn" id="clearSlotBtn">Slot leeren</button>
  </div>
</div>

<div class="sheet-overlay" id="addOverlay">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-header">
      <div class="sheet-title">Person hinzufügen</div>
      <button class="closebtn" id="addClose">✕</button>
    </div>
    <input type="text" id="nameInput" placeholder="Name" maxlength="40" />
    <div class="colorpick" id="colorPick"></div>
    <button class="addbtn" id="addConfirm" disabled>Hinzufügen</button>
  </div>
</div>

<!-- ============ Sheets: Hallenplan ============ -->
<div class="sheet-overlay" id="hallCreateOverlay">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-header">
      <div class="sheet-title">Termin hinzufügen</div>
      <button class="closebtn" id="hallCreateClose">✕</button>
    </div>

    <label class="fieldlabel">Wochentag</label>
    <div class="weekday-pick" id="weekdayPick"></div>

    <label class="fieldlabel" style="margin-top:16px;">Uhrzeit</label>
    <div class="wheel-row">
      <div class="wheel-scroll" id="hourWheel"></div>
      <div class="wheel-sep">:</div>
      <div class="wheel-scroll" id="minuteWheel"></div>
    </div>

    <label class="fieldlabel" style="margin-top:16px;">Name</label>
    <input type="text" id="hallTitleInput" placeholder="z. B. Anna – Reitstunde" maxlength="50" />

    <label class="recur-row">
      <input type="checkbox" id="hallRecurringCheck" />
      Wiederholt sich jede Woche
    </label>

    <button class="addbtn" id="hallCreateConfirm">Termin speichern</button>
  </div>
</div>

<div class="sheet-overlay" id="hallViewOverlay">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-header">
      <div class="sheet-title">Termin</div>
      <button class="closebtn" id="hallViewClose">✕</button>
    </div>
    <div id="hallViewDetails" style="margin-bottom:18px;color:#23302A;font-size:15px;line-height:1.5;"></div>
    <button class="clearbtn" id="hallDeleteBtn">Termin löschen</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase, ref, onValue, set, remove, push
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCC8aSSuP8wA6Y4VAH3jiuoLqOneyIQZDo",
    authDomain: "stallplan-31dcb.firebaseapp.com",
    databaseURL: "https://stallplan-31dcb-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "stallplan-31dcb",
    storageBucket: "stallplan-31dcb.firebasestorage.app",
    messagingSenderId: "196008024703",
    appId: "1:196008024703:web:776736ea499241e2c1fd4a",
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const PALETTE = [
    "#C1502E", "#3E7C5A", "#3E6B8A", "#C9A227", "#8B5E83",
    "#5B4636", "#3E8E8A", "#B0743C", "#6B7A3E", "#A85C7A", "#5C6BC0",
  ];
  const WEEKDAYS = ["Mo","Di","Mi","Do","Fr","Sa","So"];
  const MONTHS = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  const TASKS = ["Füttern", "Misten"];

  const pad = n => String(n).padStart(2,"0");
  const dateKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const daysInMonth = (y,m) => new Date(y,m+1,0).getDate();
  const isSameDay = (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  // ===================================================================
  // VIEW-NAVIGATION
  // ===================================================================
  let currentView = "home";
  function showView(view){
    currentView = view;
    document.getElementById("homeView").style.display = view === "home" ? "flex" : "none";
    document.getElementById("stallView").style.display = view === "stall" ? "block" : "none";
    document.getElementById("hallView").style.display = view === "hall" ? "block" : "none";
    if (view === "hall") renderHallWeek();
  }
  document.getElementById("goStall").onclick = () => showView("stall");
  document.getElementById("goHall").onclick = () => showView("hall");
  document.getElementById("stallBack").onclick = () => showView("home");
  document.getElementById("hallBack").onclick = () => showView("home");

  // ===================================================================
  // STALLDIENST
  // ===================================================================
  let people = {};
  let assignments = {};
  let cursor = new Date(); cursor.setDate(1);
  let activeSlotKey = null;
  let chosenColor = PALETTE[0];

  onValue(ref(db, ".info/connected"), snap => {
    const connected = snap.val() === true;
    document.getElementById("statusDot").classList.toggle("offline", !connected);
    document.getElementById("statusText").textContent = connected ? "Live verbunden" : "Verbinde…";
  });

  const boardTextEl = document.getElementById("boardText");
  let boardFocused = false;
  let boardDebounce = null;
  boardTextEl.addEventListener("focus", () => { boardFocused = true; });
  boardTextEl.addEventListener("blur", () => { boardFocused = false; });
  boardTextEl.addEventListener("input", () => {
    clearTimeout(boardDebounce);
    boardDebounce = setTimeout(() => {
      set(ref(db, "board"), boardTextEl.value);
    }, 400);
  });
  onValue(ref(db, "board"), snap => {
    if (boardFocused) return;
    boardTextEl.value = snap.val() || "";
  });

  onValue(ref(db, "people"), snap => {
    people = snap.val() || {};
    renderPeopleBoard();
    renderColorPicker();
    renderDays();
  });

  onValue(ref(db, "assignments"), snap => {
    assignments = snap.val() || {};
    renderDays();
  });

  function attachHoldToRemove(el, id){
    let timer = null;
    const start = (e) => {
      e.preventDefault();
      el.style.transition = "opacity .65s linear, transform .65s linear";
      el.style.opacity = "0.3";
      el.style.transform = "scale(0.92)";
      timer = setTimeout(() => {
        el.style.transition = "none";
        el.style.opacity = "1";
        el.style.transform = "scale(1)";
        removePerson(id);
      }, 700);
    };
    const cancel = () => {
      clearTimeout(timer);
      el.style.transition = "opacity .2s linear, transform .2s linear";
      el.style.opacity = "1";
      el.style.transform = "scale(1)";
    };
    el.addEventListener("pointerdown", start);
    el.addEventListener("pointerup", cancel);
    el.addEventListener("pointerleave", cancel);
    el.addEventListener("pointercancel", cancel);
  }

  function renderPeopleBoard(){
    const board = document.getElementById("peopleBoard");
    board.innerHTML = "";
    Object.entries(people).forEach(([id, p]) => {
      const chip = document.createElement("span");
      chip.className = "chip";
      chip.style.border = `1px solid ${p.color}`;
      chip.title = "Gedrückt halten zum Entfernen";
      chip.innerHTML = `<span class="dotcolor" style="background:${p.color}"></span>${escapeHtml(p.name)}`;
      attachHoldToRemove(chip, id);
      board.appendChild(chip);
    });
    const addBtn = document.createElement("button");
    addBtn.className = "addchip";
    addBtn.innerHTML = "+ Person";
    addBtn.onclick = openAddPerson;
    board.appendChild(addBtn);

    const hint = document.getElementById("peopleHint");
    hint.style.display = Object.keys(people).length > 0 ? "block" : "none";
  }

  function openAddPerson(){
    document.getElementById("nameInput").value = "";
    const used = new Set(Object.values(people).map(p => p.color));
    chosenColor = PALETTE.find(c => !used.has(c)) || PALETTE[0];
    renderColorPicker();
    document.getElementById("addConfirm").disabled = true;
    document.getElementById("addOverlay").classList.add("open");
    document.getElementById("nameInput").focus();
  }

  function renderColorPicker(){
    const pick = document.getElementById("colorPick");
    pick.innerHTML = "";
    PALETTE.forEach(c => {
      const b = document.createElement("button");
      b.className = "colorbtn" + (c === chosenColor ? " selected" : "");
      b.style.background = c;
      b.onclick = () => { chosenColor = c; renderColorPicker(); };
      pick.appendChild(b);
    });
  }

  document.getElementById("nameInput").addEventListener("input", e => {
    document.getElementById("addConfirm").disabled = !e.target.value.trim();
  });
  document.getElementById("nameInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && e.target.value.trim()) confirmAddPerson();
  });
  document.getElementById("addConfirm").onclick = confirmAddPerson;
  document.getElementById("addClose").onclick = () => document.getElementById("addOverlay").classList.remove("open");
  document.getElementById("addOverlay").onclick = () => document.getElementById("addOverlay").classList.remove("open");

  function confirmAddPerson(){
    const name = document.getElementById("nameInput").value.trim();
    if (!name) return;
    if (Object.keys(people).length >= PALETTE.length){
      alert(`Maximal ${PALETTE.length} Personen sind für diesen Plan vorgesehen.`);
      return;
    }
    const newRef = push(ref(db, "people"));
    set(newRef, { name, color: chosenColor });
    document.getElementById("addOverlay").classList.remove("open");
  }

  function removePerson(id){
    if (!confirm(`${people[id]?.name || "Person"} wirklich entfernen? Alle ihre eingetragenen Dienste werden dabei ebenfalls gelöscht.`)) return;
    remove(ref(db, `people/${id}`));
    Object.entries(assignments).forEach(([key, entry]) => {
      const pid = entry && typeof entry === "object" ? entry.person : entry;
      if (pid === id) remove(ref(db, `assignments/${key}`));
    });
  }

  function renderMonthNav(){
    document.getElementById("monthLabel").textContent = `${MONTHS[cursor.getMonth()]} ${cursor.getFullYear()}`;
  }

  function renderDays(){
    renderMonthNav();
    const list = document.getElementById("daysList");
    list.innerHTML = "";
    const y = cursor.getFullYear(), m = cursor.getMonth();
    const total = daysInMonth(y, m);
    const today = new Date();

    for (let d = 1; d <= total; d++){
      const date = new Date(y, m, d);
      const isToday = isSameDay(date, today);
      const mKey = `${dateKey(date)}_morning`;
      const eKey = `${dateKey(date)}_evening`;

      const row = document.createElement("div");
      row.className = "day-row";

      const dayNum = document.createElement("div");
      dayNum.className = "daynum";
      dayNum.innerHTML = `
        <div class="weekday ${isToday?'today':''}">${WEEKDAYS[(date.getDay()+6)%7]}</div>
        <div class="num ${isToday?'today':''}">${d}</div>`;
      row.appendChild(dayNum);

      row.appendChild(makeSlot("Morgens", mKey, date));
      row.appendChild(makeSlot("Abends", eKey, date));

      list.appendChild(row);
    }
  }

  function makeSlot(label, key, date){
    const entry = assignments[key];
    const personId = entry && typeof entry === "object" ? entry.person : entry;
    const task = entry && typeof entry === "object" ? entry.task : null;
    const person = personId ? people[personId] : null;
    const btn = document.createElement("button");
    btn.className = "slot" + (person ? " filled" : "");
    if (person) btn.style.setProperty("--c", person.color);
    const nameText = person
      ? escapeHtml(person.name) + (task ? ` (${escapeHtml(task)})` : "")
      : "+ eintragen";
    btn.innerHTML = `<span class="slotlabel">${label}</span><span class="slotname">${nameText}</span>`;
    btn.onclick = () => openAssign(key, `${label}, ${date.getDate()}. ${MONTHS[date.getMonth()]}`);
    return btn;
  }

  function openAssign(key, title){
    activeSlotKey = key;
    document.getElementById("assignTitle").textContent = title;
    renderPersonStep();
    document.getElementById("assignOverlay").classList.add("open");
  }

  function renderPersonStep(){
    const listEl = document.getElementById("assignList");
    listEl.innerHTML = "";
    const entries = Object.entries(people);
    if (entries.length === 0){
      listEl.innerHTML = `<div class="empty-note">Noch niemand angelegt. Füge oben eine Person hinzu.</div>`;
      return;
    }
    entries.forEach(([id, p]) => {
      const b = document.createElement("button");
      b.className = "person-btn";
      b.style.setProperty("--c", p.color);
      b.textContent = p.name;
      b.onclick = () => renderTaskStep(id);
      listEl.appendChild(b);
    });
  }

  function renderTaskStep(personId){
    const p = people[personId];
    const listEl = document.getElementById("assignList");
    listEl.innerHTML = "";

    const back = document.createElement("button");
    back.className = "backbtn";
    back.textContent = "‹ Zurück zur Personenwahl";
    back.onclick = renderPersonStep;
    listEl.appendChild(back);

    TASKS.forEach(task => {
      const b = document.createElement("button");
      b.className = "person-btn";
      b.style.setProperty("--c", p.color);
      b.textContent = `${p.name} – ${task}`;
      b.onclick = () => {
        set(ref(db, `assignments/${activeSlotKey}`), { person: personId, task });
        document.getElementById("assignOverlay").classList.remove("open");
      };
      listEl.appendChild(b);
    });
  }

  document.getElementById("clearSlotBtn").onclick = () => {
    if (activeSlotKey) remove(ref(db, `assignments/${activeSlotKey}`));
    document.getElementById("assignOverlay").classList.remove("open");
  };
  document.getElementById("assignClose").onclick = () => document.getElementById("assignOverlay").classList.remove("open");
  document.getElementById("assignOverlay").onclick = () => document.getElementById("assignOverlay").classList.remove("open");

  document.getElementById("prevMonth").onclick = () => {
    cursor = new Date(cursor.getFullYear(), cursor.getMonth()-1, 1);
    renderDays();
  };
  document.getElementById("nextMonth").onclick = () => {
    cursor = new Date(cursor.getFullYear(), cursor.getMonth()+1, 1);
    renderDays();
  };

  // ===================================================================
  // HALLENPLAN
  // ===================================================================
  const HALL_START_MIN = 8 * 60;
  const HALL_END_MIN = 20 * 60;
  const HOUR_VALUES = Array.from({length: 13}, (_, i) => 8 + i); // 8..20
  const MINUTE_VALUES = [0, 15, 30, 45];

  let hallEvents = {};
  let pendingDeleteId = null;
  let selectedWeekday = 0;
  let selectedHour = 9;
  let selectedMinute = 0;

  function getMonday(d){
    const date = new Date(d);
    const day = (date.getDay() + 6) % 7;
    date.setDate(date.getDate() - day);
    date.setHours(0,0,0,0);
    return date;
  }
  let hallCursor = getMonday(new Date());

  function getISOWeek(d){
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const dayNum = (date.getUTCDay() + 6) % 7;
    date.setUTCDate(date.getUTCDate() - dayNum + 3);
    const firstThursday = new Date(Date.UTC(date.getUTCFullYear(), 0, 4));
    const diff = (date - firstThursday) / 86400000;
    return 1 + Math.round(diff / 7);
  }

  function timeLabel(min){
    return `${pad(Math.floor(min/60))}:${pad(min%60)}`;
  }

  onValue(ref(db, "hallEvents"), snap => {
    hallEvents = snap.val() || {};
    if (currentView === "hall") renderHallWeek();
  });

  function renderHallWeek(){
    const monday = hallCursor;
    const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6);
    const fmt = d => `${pad(d.getDate())}.${pad(d.getMonth()+1)}.`;
    document.getElementById("hallWeekLabel").textContent =
      `KW ${getISOWeek(monday)}  ·  ${fmt(monday)} – ${fmt(sunday)}`;

    const rows = document.getElementById("hallRows");
    rows.innerHTML = "";
    const today = new Date();

    for (let i = 0; i < 7; i++){
      const date = new Date(monday); date.setDate(date.getDate() + i);
      const dKey = dateKey(date);
      const isToday = isSameDay(date, today);

      const row = document.createElement("div");
      row.className = "hall-row";

      const label = document.createElement("div");
      label.className = "hall-row-label" + (isToday ? " today" : "");
      label.innerHTML = `<div class="wd">${WEEKDAYS[i]}</div><div class="dt">${pad(date.getDate())}.${pad(date.getMonth()+1)}.</div>`;
      row.appendChild(label);

      const chipsWrap = document.createElement("div");
      chipsWrap.className = "hall-chips";

      const dayEvents = Object.entries(hallEvents)
        .filter(([, ev]) => ev.recurring ? ev.weekday === i : ev.date === dKey)
        .sort((a, b) => a[1].startMinutes - b[1].startMinutes);

      if (dayEvents.length === 0){
        const empty = document.createElement("div");
        empty.className = "hall-chip-empty";
        empty.textContent = "Keine Termine";
        chipsWrap.appendChild(empty);
      } else {
        dayEvents.forEach(([id, ev]) => {
          const chip = document.createElement("div");
          chip.className = "hall-chip";
          chip.style.setProperty("--c", ev.recurring ? "#3E6B8A" : "#C1502E");
          chip.innerHTML = `<div class="ti">${escapeHtml(ev.title)}${ev.recurring ? " 🔁" : ""}</div><div class="tm">${timeLabel(ev.startMinutes)} Uhr</div>`;
          chip.onclick = () => openViewEvent(id, ev);
          chipsWrap.appendChild(chip);
        });
      }

      row.appendChild(chipsWrap);
      rows.appendChild(row);
    }
  }

  document.getElementById("hallPrevWeek").onclick = () => {
    hallCursor.setDate(hallCursor.getDate() - 7);
    renderHallWeek();
  };
  document.getElementById("hallNextWeek").onclick = () => {
    hallCursor.setDate(hallCursor.getDate() + 7);
    renderHallWeek();
  };

  function renderWeekdayPick(){
    const wrap = document.getElementById("weekdayPick");
    wrap.innerHTML = "";
    WEEKDAYS.forEach((wd, i) => {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "wd-btn" + (i === selectedWeekday ? " selected" : "");
      b.textContent = wd;
      b.onclick = () => { selectedWeekday = i; renderWeekdayPick(); };
      wrap.appendChild(b);
    });
  }

  function setupWheel(id, values, current, onPick){
    const el = document.getElementById(id);
    const itemH = 36;
    el.innerHTML = "";
    const padTop = document.createElement("div"); padTop.style.height = itemH + "px"; el.appendChild(padTop);
    values.forEach(v => {
      const it = document.createElement("div");
      it.className = "wheel-item";
      it.textContent = pad(v);
      it.dataset.val = v;
      el.appendChild(it);
    });
    const padBottom = document.createElement("div"); padBottom.style.height = itemH + "px"; el.appendChild(padBottom);

    let timer = null;
    function syncSelection(snap){
      const items = el.querySelectorAll(".wheel-item");
      const center = el.scrollTop + el.clientHeight / 2;
      let closest = null, dist = Infinity;
      items.forEach(it => {
        const mid = it.offsetTop + it.offsetHeight / 2;
        const d = Math.abs(mid - center);
        if (d < dist){ dist = d; closest = it; }
      });
      items.forEach(it => it.classList.toggle("selected", it === closest));
      if (closest){
        onPick(Number(closest.dataset.val));
        if (snap) el.scrollTo({ top: closest.offsetTop - itemH, behavior: "smooth" });
      }
    }
    el.addEventListener("scroll", () => {
      clearTimeout(timer);
      timer = setTimeout(() => syncSelection(true), 120);
    });

    requestAnimationFrame(() => {
      const items = el.querySelectorAll(".wheel-item");
      let idx = values.indexOf(current);
      if (idx < 0) idx = 0;
      el.scrollTop = items[idx].offsetTop - itemH;
      syncSelection(false);
    });
  }

  function openHallCreate(){
    selectedWeekday = (new Date().getDay() + 6) % 7;
    selectedHour = 9;
    selectedMinute = 0;
    document.getElementById("hallTitleInput").value = "";
    document.getElementById("hallRecurringCheck").checked = false;
    renderWeekdayPick();
    setupWheel("hourWheel", HOUR_VALUES, 9, v => selectedHour = v);
    setupWheel("minuteWheel", MINUTE_VALUES, 0, v => selectedMinute = v);
    document.getElementById("hallCreateOverlay").classList.add("open");
  }
  document.getElementById("hallAddBtn").onclick = openHallCreate;
  document.getElementById("hallCreateClose").onclick = () => document.getElementById("hallCreateOverlay").classList.remove("open");
  document.getElementById("hallCreateOverlay").onclick = () => document.getElementById("hallCreateOverlay").classList.remove("open");

  document.getElementById("hallCreateConfirm").onclick = () => {
    const title = document.getElementById("hallTitleInput").value.trim();
    if (!title){ alert("Bitte einen Namen eingeben."); return; }
    const recurring = document.getElementById("hallRecurringCheck").checked;
    const startMinutes = selectedHour * 60 + selectedMinute;

    if (startMinutes < HALL_START_MIN || startMinutes >= HALL_END_MIN){
      alert("Bitte eine Uhrzeit zwischen 08:00 und 19:45 Uhr wählen.");
      return;
    }

    const date = new Date(hallCursor); date.setDate(date.getDate() + selectedWeekday);
    const dKey = dateKey(date);

    const newRef = push(ref(db, "hallEvents"));
    set(newRef, {
      title,
      date: recurring ? null : dKey,
      weekday: selectedWeekday,
      startMinutes,
      recurring,
    });
    document.getElementById("hallCreateOverlay").classList.remove("open");
  };

  function openViewEvent(id, ev){
    pendingDeleteId = id;
    const recurNote = ev.recurring
      ? "<br><strong>Regeltermin</strong> – wiederholt sich jede Woche."
      : "";
    document.getElementById("hallViewDetails").innerHTML =
      `<strong>${escapeHtml(ev.title)}</strong><br>${timeLabel(ev.startMinutes)} Uhr${recurNote}`;
    document.getElementById("hallViewOverlay").classList.add("open");
  }

  document.getElementById("hallViewClose").onclick = () => document.getElementById("hallViewOverlay").classList.remove("open");
  document.getElementById("hallViewOverlay").onclick = () => document.getElementById("hallViewOverlay").classList.remove("open");

  document.getElementById("hallDeleteBtn").onclick = () => {
    if (!pendingDeleteId) return;
    if (!confirm("Diesen Termin wirklich löschen? Bei einem Regeltermin wird die komplette Wiederholung entfernt.")) return;
    remove(ref(db, `hallEvents/${pendingDeleteId}`));
    document.getElementById("hallViewOverlay").classList.remove("open");
  };

  // ===================================================================
  // Start
  // ===================================================================
  renderDays();
  showView("home");
</script>
</body>
</html>
